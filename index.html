<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🇯🇵 일본 여행 일본어</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f7f4f0;
      color: #2d2d2d;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }
    button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* HEADER */
    .header {
      background: #c0392b;
      color: white;
      padding: 14px 16px 12px;
      text-align: center;
    }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    /* NAV */
    .nav {
      display: flex;
      background: white;
      border-bottom: 1px solid #ebe8e4;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .nav-tab {
      flex: 1; border: none; background: none;
      padding: 10px 2px 8px;
      font-size: 11px; color: #aaa;
      border-bottom: 2px solid transparent;
      transition: all 0.15s; line-height: 1.4;
    }
    .nav-tab .tab-icon { display: block; font-size: 18px; }
    .nav-tab.active { color: #c0392b; border-bottom-color: #c0392b; font-weight: 600; }

    /* SCREENS */
    .screen { display: none; padding: 16px 16px 100px; }
    .screen.active { display: block; }

    .section-title {
      font-size: 12px; font-weight: 700; color: #aaa;
      letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px;
    }

    /* CATEGORY GRID */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-card {
      background: white; border-radius: 14px; padding: 18px 12px;
      text-align: center; border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.15s;
    }
    .cat-card:active { transform: scale(0.96); }
    .cat-emoji { font-size: 30px; display: block; margin-bottom: 8px; }
    .cat-name { font-size: 13px; font-weight: 700; }
    .cat-prog { font-size: 11px; color: #aaa; margin-top: 4px; }
    .mini-bar { background: #f0ece8; border-radius: 4px; height: 3px; margin-top: 8px; }
    .mini-fill { background: #c0392b; height: 100%; border-radius: 4px; transition: width 0.3s; }

    /* PHRASE CARD */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; color: #c0392b;
      font-size: 14px; font-weight: 600; padding: 0; margin-bottom: 14px;
    }
    .counter { text-align: right; font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .phrase-card {
      background: white; border-radius: 18px; padding: 28px 20px 24px;
      text-align: center; box-shadow: 0 3px 16px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .cat-tag {
      display: inline-block; background: #fff3f3; color: #c0392b;
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 16px;
    }
    .phrase-jp { font-size: 28px; font-weight: 700; color: #1a1a1a; line-height: 1.4; margin-bottom: 8px; }
    .phrase-hira { font-size: 14px; color: #888; margin-bottom: 6px; }
    .phrase-pron {
      display: inline-block; background: #f5f0eb; color: #666;
      font-size: 13px; padding: 4px 14px; border-radius: 20px; margin-bottom: 16px;
    }
    .divider { border: none; border-top: 1px solid #f0ece8; margin: 14px 0; }
    .phrase-ko { font-size: 20px; font-weight: 700; }
    .card-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: center; }
    .tts-btn {
      background: #c0392b; color: white; border: none;
      border-radius: 50px; padding: 12px 24px; font-size: 15px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .check-btn {
      background: white; color: #4caf50; border: 2px solid #4caf50;
      border-radius: 50px; padding: 12px 20px; font-size: 15px; font-weight: 600;
    }
    .check-btn.done { background: #4caf50; color: white; }
    .nav-arrows { display: flex; gap: 10px; }
    .arrow-btn {
      flex: 1; background: white; border: 2px solid #e0dbd5;
      border-radius: 12px; padding: 13px; font-size: 15px; color: #555; font-weight: 600;
    }
    .arrow-btn:disabled { opacity: 0.3; }

    /* QUIZ */
    .start-btn {
      width: 100%; background: #c0392b; color: white; border: none;
      border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 700; margin-top: 16px;
    }
    .filter-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .filter-btn {
      padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
      border: 2px solid #e0dbd5; background: white; color: #666;
    }
    .filter-btn.on { border-color: #c0392b; background: #fff3f3; color: #c0392b; }

    .q-progress { margin-bottom: 16px; }
    .q-progress-row { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .prog-bar { background: #e8e4e0; border-radius: 6px; height: 6px; }
    .prog-fill { background: #c0392b; height: 100%; border-radius: 6px; transition: width 0.3s; }

    .quiz-card {
      background: white; border-radius: 18px; padding: 24px 20px;
      box-shadow: 0 3px 16px rgba(0,0,0,0.08); margin-bottom: 16px; text-align: center;
    }
    .quiz-tag {
      display: inline-block; background: #f5f0eb; color: #888;
      font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px;
    }
    .quiz-q { font-size: 22px; font-weight: 700; line-height: 1.4; color: #1a1a1a; }
    .quiz-sub { font-size: 13px; color: #aaa; margin-top: 8px; }
    .audio-btn {
      background: #c0392b; color: white; border: none; border-radius: 50px;
      padding: 14px 32px; font-size: 20px; margin: 16px auto 0;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-row {
      display: flex; align-items: center; gap: 8px;
      background: white; border: 2px solid #e0dbd5; border-radius: 14px;
      overflow: hidden; transition: border-color 0.15s;
    }
    .opt-row.correct { background: #e8f5e9; border-color: #4caf50; }
    .opt-row.wrong   { background: #fdecea; border-color: #f44336; }
    .opt {
      flex: 1; background: none; border: none;
      padding: 15px 4px 15px 16px; font-size: 15px; text-align: left; color: #2d2d2d;
    }
    .opt:active { opacity: 0.7; }
    .opt.correct { color: #2e7d32; font-weight: 600; }
    .opt.wrong   { color: #c62828; }
    .opt:disabled { cursor: default; }
    .spk-btn {
      flex-shrink: 0; background: none; border: none;
      padding: 15px 14px 15px 6px; font-size: 17px; color: #bbb;
      display: flex; align-items: center;
    }
    .spk-btn:active { color: #c0392b; }

    .feedback-box { text-align: center; padding: 8px 0 4px; }
    .fb-emoji { font-size: 46px; display: block; margin-bottom: 6px; }
    .fb-text { font-size: 16px; font-weight: 700; }
    .fb-ans { font-size: 14px; color: #c0392b; margin-top: 4px; font-weight: 600; }
    .next-btn {
      width: 100%; background: #c0392b; color: white; border: none;
      border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 700; margin-top: 12px;
    }

    /* QUIZ RESULT */
    .result-card {
      background: white; border-radius: 18px; padding: 36px 20px;
      text-align: center; box-shadow: 0 3px 16px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .result-emoji { font-size: 60px; display: block; margin-bottom: 12px; }
    .result-score { font-size: 52px; font-weight: 800; color: #c0392b; }
    .result-label { font-size: 15px; color: #aaa; margin-top: 4px; }
    .result-msg { font-size: 19px; font-weight: 700; margin-top: 16px; }
    .outline-btn {
      width: 100%; background: white; color: #c0392b; border: 2px solid #c0392b;
      border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 700; margin-top: 10px;
    }

    /* LISTEN & REPEAT */
    .repeat-card {
      background: white; border-radius: 18px; padding: 28px 20px 24px;
      text-align: center; box-shadow: 0 3px 16px rgba(0,0,0,0.08); margin-bottom: 14px;
    }
    .step-tag {
      display: inline-block; background: #fff3f3; color: #c0392b;
      font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
    }
    .mic-wrap { display: flex; justify-content: center; margin: 20px 0 8px; }
    .mic-btn {
      width: 88px; height: 88px; border-radius: 50%; border: none;
      font-size: 36px; background: #c0392b; color: white;
      box-shadow: 0 6px 20px rgba(192,57,43,0.4);
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .mic-btn.recording { background: #e74c3c; animation: pulse 1s infinite; }
    .mic-btn.inactive { background: #ccc; box-shadow: none; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 6px 20px rgba(231,76,60,0.35); transform: scale(1); }
      50%      { box-shadow: 0 6px 36px rgba(231,76,60,0.7);  transform: scale(1.06); }
    }
    .mic-label { font-size: 13px; color: #aaa; }
    .recog-box {
      background: #f7f4f0; border-radius: 12px; padding: 14px 16px; margin-top: 14px;
      font-size: 16px; min-height: 52px; display: flex; align-items: center; justify-content: center; color: #ccc;
    }
    .recog-result {
      margin-top: 10px; padding: 12px 16px; border-radius: 12px;
      font-size: 14px; font-weight: 600; text-align: center;
    }
    .recog-result.good  { background: #e8f5e9; color: #2e7d32; }
    .recog-result.retry { background: #fff8e1; color: #e65100; }
    .recog-result.err   { background: #f5f5f5; color: #999; }

    /* PROGRESS */
    .total-card {
      background: #c0392b; color: white; border-radius: 18px;
      padding: 28px 20px; text-align: center; margin-bottom: 16px;
    }
    .total-pct { font-size: 52px; font-weight: 800; }
    .total-label { font-size: 14px; opacity: 0.85; margin-top: 4px; }
    .total-sub { font-size: 12px; opacity: 0.7; margin-top: 8px; }
    .prog-item {
      background: white; border-radius: 14px; padding: 16px;
      margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .prog-name { font-size: 14px; font-weight: 700; }
    .prog-cnt { font-size: 13px; color: #c0392b; font-weight: 600; }
    .prog-bar2 { background: #f0ece8; border-radius: 6px; height: 6px; }
    .prog-fill2 { background: #c0392b; height: 100%; border-radius: 6px; transition: width 0.3s; }
    .reset-btn {
      width: 100%; background: white; color: #bbb; border: 1px solid #e0dbd5;
      border-radius: 14px; padding: 14px; font-size: 14px; margin-top: 8px;
    }

    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .hidden { display: none !important; }
    .text-muted { color: #aaa; font-size: 13px; }

    /* AI / SETTINGS */
    .modal-backdrop {
      position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;
      display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .modal-box { background:white;border-radius:22px;padding:28px 24px;width:100%;max-width:440px; }
    .modal-title { font-size:18px;font-weight:800;margin-bottom:6px; }
    .modal-sub { font-size:13px;color:#888;margin-bottom:18px;line-height:1.65; }
    .modal-input {
      width:100%;border:2px solid #e0dbd5;border-radius:12px;
      padding:14px 16px;font-size:14px;outline:none;font-family:inherit;
    }
    .modal-input:focus { border-color:#3498db; }
    .modal-btns { display:flex;gap:10px;margin-top:14px; }
    .sit-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px; }
    .sit-btn {
      padding:12px 8px;border-radius:12px;border:2px solid #e0dbd5;
      background:white;font-size:13px;color:#555;cursor:pointer;line-height:1.4;
    }
    .sit-btn.on { border-color:#3498db;background:#eaf4fd;color:#2980b9;font-weight:700; }
    .ai-section {
      background:linear-gradient(135deg,#eaf4fd 0%,#e8f5e9 100%);
      border-radius:16px;padding:20px;margin-top:24px;
      border-top:2px dashed #bee3f8;
    }
    .ai-section-title { font-size:14px;font-weight:800;color:#2980b9;margin-bottom:4px; }
    .ai-info { font-size:13px;color:#555;margin-bottom:14px;line-height:1.6; }
    .ai-generating { text-align:center;padding:28px 0; }
    .spin { display:inline-block;animation:spin 1.2s linear infinite;font-size:32px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .ai-result-phrases {
      background:white;border-radius:12px;padding:14px 16px;margin-bottom:12px;
      max-height:200px;overflow-y:auto;
    }
    .ai-phrase-row {
      padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;
    }
    .ai-phrase-row:last-child { border-bottom:none; }
    .ai-phrase-jp { font-weight:700;color:#1a1a1a; }
    .ai-phrase-ko { color:#888;margin-top:2px; }
    .settings-btn {
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:rgba(255,255,255,0.2);border:none;border-radius:50%;
      width:36px;height:36px;font-size:18px;color:white;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
  </style>
</head>
<body>

<div class="header" style="position:relative">
  <div class="header-title">🇯🇵 일본 여행 일본어</div>
  <div class="header-sub">아빠와 딸이 함께 배우는 여행 회화</div>
  <button id="settings-toggle-btn" class="settings-btn" onclick="showSettingsModal()">⚙️</button>
</div>

<nav class="nav">
  <button class="nav-tab active" onclick="showTab('learn')">
    <span class="tab-icon">📖</span>학습
  </button>
  <button class="nav-tab" onclick="showTab('quiz')">
    <span class="tab-icon">🎯</span>퀴즈
  </button>
  <button class="nav-tab" onclick="showTab('repeat')">
    <span class="tab-icon">🎤</span>따라하기
  </button>
  <button class="nav-tab" onclick="showTab('progress')">
    <span class="tab-icon">⭐</span>진도
  </button>
</nav>

<!-- LEARN -->
<div id="screen-learn" class="screen active">
  <div id="learn-cats"></div>
  <div id="learn-cards" class="hidden"></div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div id="quiz-setup"></div>
  <div id="quiz-active" class="hidden"></div>
  <div id="quiz-result" class="hidden"></div>
</div>

<!-- REPEAT -->
<div id="screen-repeat" class="screen">
  <div id="repeat-setup"></div>
  <div id="repeat-active" class="hidden"></div>
</div>

<!-- PROGRESS -->
<div id="screen-progress" class="screen">
  <div id="progress-content"></div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title">⚙️ AI 설정</div>
    <div id="modal-server-notice" style="background:#e8f5e9;border-radius:10px;padding:10px 14px;font-size:13px;color:#2e7d32;margin-bottom:14px;display:none">
      ✅ <b>Vercel 배포 버전</b> — 서버에서 자동으로 API를 처리해요. 키 입력 없이도 AI 기능이 동작합니다.
    </div>
    <div class="modal-sub">AI 제공자를 선택하고 API 키를 입력하세요.<br>키는 이 기기에만 저장됩니다. (GitHub Pages 전용)</div>

    <!-- 제공자 선택 -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="prov-gemini" class="sit-btn on" onclick="selectProvider('gemini')" style="flex:1;padding:14px 8px">
        <div style="font-size:16px">🟢 Gemini</div>
        <div style="font-size:11px;color:#27ae60;margin-top:2px">무료 사용 가능</div>
      </button>
      <button id="prov-openai" class="sit-btn" onclick="selectProvider('openai')" style="flex:1;padding:14px 8px">
        <div style="font-size:16px">🔵 OpenAI</div>
        <div style="font-size:11px;color:#888;margin-top:2px">유료 (gpt-4o-mini)</div>
      </button>
    </div>

    <!-- Gemini 키 입력 -->
    <div id="gemini-key-row">
      <div style="font-size:12px;color:#27ae60;font-weight:700;margin-bottom:6px">Google AI Studio 키</div>
      <input id="gemini-key-input" class="modal-input" type="password" placeholder="AIza..." />
      <a href="https://aistudio.google.com/app/apikey" target="_blank"
         style="display:block;font-size:12px;color:#3498db;margin-top:6px">→ Google AI Studio에서 무료 키 발급</a>
    </div>

    <!-- OpenAI 키 입력 -->
    <div id="openai-key-row" style="display:none">
      <div style="font-size:12px;color:#2980b9;font-weight:700;margin-bottom:6px">OpenAI API 키</div>
      <input id="openai-key-input" class="modal-input" type="password" placeholder="sk-..." />
      <a href="https://platform.openai.com/api-keys" target="_blank"
         style="display:block;font-size:12px;color:#3498db;margin-top:6px">→ OpenAI에서 키 발급</a>
    </div>

    <div class="modal-btns" style="margin-top:16px">
      <button class="outline-btn" style="flex:1;margin:0" onclick="hideSettingsModal()">취소</button>
      <button class="start-btn" style="margin:0;flex:1" onclick="saveApiKey()">저장</button>
    </div>
    <button onclick="clearApiKey()" style="width:100%;background:none;border:none;color:#ccc;font-size:12px;margin-top:10px;padding:4px;cursor:pointer">저장된 키 모두 삭제</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const CATS = [
  { id:'greet',       name:'기본 인사',   emoji:'👋' },
  { id:'hotel',       name:'호텔',        emoji:'🏨' },
  { id:'food',        name:'음식점',      emoji:'🍜' },
  { id:'transit',     name:'교통',        emoji:'🚃' },
  { id:'sightseeing', name:'관광지',      emoji:'⛩️' },
  { id:'mama',        name:'엄마용 고급', emoji:'👩' },
  { id:'shop',  name:'쇼핑',      emoji:'🛍️' },
  { id:'daily', name:'일상 대화', emoji:'💬' },
  // 단어 카테고리
  { id:'w_num',     name:'숫자·돈',  emoji:'🔢', isWord:true },
  { id:'w_food',    name:'음식 단어', emoji:'🍱', isWord:true },
  { id:'w_place',   name:'장소',     emoji:'📍', isWord:true },
  { id:'w_adj',     name:'형용사',   emoji:'🎨', isWord:true },
  { id:'w_time',    name:'시간',     emoji:'⏰', isWord:true },
  { id:'w_noun',    name:'생활 명사', emoji:'🎒', isWord:true },
  { id:'w_weather', name:'날씨·계절', emoji:'🌤️', isWord:true },
];

const PHRASES = [
  // ── 기본 인사 ────────────────────────────────────────────────────
  { id:'g1',  cat:'greet', jp:'こんにちは',             hira:'こんにちは',               pron:'곤니치와',                  ko:'안녕하세요',              blank:null },
  { id:'g2',  cat:'greet', jp:'ありがとうございます',     hira:'ありがとうございます',     pron:'아리가토- 고자이마스',       ko:'감사합니다',              blank:null },
  { id:'g3',  cat:'greet', jp:'すみません',              hira:'すみません',               pron:'스미마센',                  ko:'저기요 / 실례합니다',     blank:null },
  { id:'g4',  cat:'greet', jp:'わかりません',             hira:'わかりません',             pron:'와카리마센',                ko:'모르겠어요',              blank:null },
  { id:'g5',  cat:'greet', jp:'もう一度お願いします',     hira:'もういちどおねがいします', pron:'모- 이치도 오네가이시마스', ko:'한 번 더 부탁드려요',     blank:{ w:'もう一度', opts:['もう一度','ゆっくり','たくさん','もっと'] } },

// Vercel 배포 여부 감지 (github.io가 아니면 Vercel 또는 로컬로 판단)
const IS_SERVER_MODE = !window.location.hostname.includes('github.io');
// Vercel 모드에서는 API 키 설정 버튼 숨김
if (IS_SERVER_MODE) {
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('settings-toggle-btn');

  });

const PROMPT_TEMPLATE = sit =>
  `일본 여행 중 "${sit}" 상황에서 실제로 쓸 수 있는 자연스러운 일본어 회화 표현 10개를 JSON 배열로만 출력하세요.\n각 항목 형식: {"jp":"일본어문장","hira":"히라가나표기","pron":"한국어발음(띄어쓰기포함)","ko":"한국어뜻"}\n반드시 JSON 배열만 출력. 다른 텍스트 절대 금지.`;

async function callServerAPI(situation) {
  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ situation }),
    signal: AbortSignal.timeout(20000)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `서버 오류 ${res.status}`);
  }
  const data = await res.json();
  return data.phrases;
}

async function callGemini(key, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.85,maxOutputTokens:1200}})
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `Gemini HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text.trim();
}

async function callOpenAI(key, prompt) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:prompt}],temperature:0.85,max_tokens:1200})
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `OpenAI HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.choices[0].message.content.trim();
}

async function generateAIPhrases(situation) {
  // Vercel/로컬: 서버 API 사용 (키 불필요)
  if (IS_SERVER_MODE) {
    const phrases = await callServerAPI(situation);
    return phrases.map((p,i) => ({...p, id:`ai_${Date.now()}_${i}`, cat:'ai', blank:null}));
  }
  // GitHub Pages: localStorage 키로 직접 호출
  const key = getActiveKey();
  if (!key) { showSettingsModal(); return null; }
  const prompt = PROMPT_TEMPLATE(situation);
  const raw = getProvider()==='openai'
    ? await callOpenAI(key, prompt)
    : await callGemini(key, prompt);
  const text = raw.replace(/```json\n?|\n?```/g,'').replace(/^[^[]*(\[)/,'$1').replace(/\][^]]*$/,']');
  const parsed = JSON.parse(text);
  return parsed.map((p,i) => ({...p, id:`ai_${Date.now()}_${i}`, cat:'ai', blank:null}));
}

  document.getElementById('screen-'+id).classList.add('active');
  const idx = ['learn','quiz','repeat','progress'].indexOf(id);
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (id==='progress') renderProgress();
  if (id==='quiz')     renderQuizSetup();
  if (id==='repeat')   renderRepeatSetup();
}

// ── TTS ──────────────────────────────────────────────────────────
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.85;
  speechSynthesis.speak(u);
}
const esc = s => (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');

// ── LEARN ────────────────────────────────────────────────────────
let learnCat = null, learnIdx = 0, learnMode = 'normal';

function initLearn() { renderLearnCats(); }

function modeBtnStyle(active, color) {
  return `flex:1;padding:14px 8px;border-radius:14px;font-size:15px;font-weight:700;border:2px solid ${active?color:'#e0dbd5'};background:${active?(color==='#9b59b6'?'#f5eef8':'#fff3f3'):'white'};color:${active?color:'#888'}`;
}

function catCardHtml(cat, isMama, fullWidth) {
  const ps = PHRASES.filter(p=>p.cat===cat.id);
  const done = ps.filter(p=>learned[p.id]).length;
  const pct = ps.length ? Math.round(done/ps.length*100) : 0;
  const color = isMama ? '#9b59b6' : cat.isWord ? '#e67e22' : '#c0392b';
  return `<div class="cat-card" onclick="openLearnCat('${cat.id}')" style="${fullWidth?'grid-column:1/-1;':''}">
    <span class="cat-emoji">${cat.emoji}</span>
    <div class="cat-name">${cat.name}</div>
    <div class="cat-prog">${done}/${ps.length} 완료</div>
    <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function renderLearnCats() {
  document.getElementById('learn-cats').classList.remove('hidden');
  document.getElementById('learn-cards').classList.add('hidden');
  const isMama = learnMode === 'mama';

  let body = '';
  if (isMama) {
    body = `
      <div style="background:#f5eef8;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#6c3483;line-height:1.7">🔥 실제 일본인 표현·관용구·유머 20문장</div>
      <div class="section-title">카테고리 선택</div>
      <div class="cat-grid">${catCardHtml(CATS.find(c=>c.id==='mama'), true, true)}</div>`;
  } else {
    const convCats = CATS.filter(c=>!c.isWord && c.id!=='mama');
    const wordCats = CATS.filter(c=>c.isWord);
    body = `
      <div class="section-title">💬 회화</div>
      <div class="cat-grid">${convCats.map(c=>catCardHtml(c,false,false)).join('')}</div>
      <div class="section-title" style="margin-top:20px">📝 단어</div>
      <div class="cat-grid">${wordCats.map(c=>catCardHtml(c,false,false)).join('')}</div>`;
  }

  document.getElementById('learn-cats').innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <button onclick="setLearnMode('normal')" style="${modeBtnStyle(!isMama,'#c0392b')}">📖 일반 학습</button>
      <button onclick="setLearnMode('mama')"  style="${modeBtnStyle(isMama,'#9b59b6')}">👩 엄마용 고급</button>
    </div>
    ${body}`;
}

function setLearnMode(mode) { learnMode = mode; renderLearnCats(); }

function openLearnCat(catId) {
  learnCat = catId; learnIdx = 0;
  document.getElementById('learn-cats').classList.add('hidden');
  document.getElementById('learn-cards').classList.remove('hidden');
  renderLearnCard();
}

function renderLearnCard() {
  const ps = PHRASES.filter(p=>p.cat===learnCat);
  const p  = ps[learnIdx];
  const cat = CATS.find(c=>c.id===learnCat);
  const done = learned[p.id];
  const isWord = !!cat.isWord;
  const cardBody = isWord ? `
      <div class="cat-tag" style="background:${done?'#fff8f0':'#fff8f0'};color:#e67e22">${cat.emoji} ${cat.name}</div>
      <div style="font-size:52px;font-weight:800;color:#1a1a1a;line-height:1.2;margin-bottom:10px">${p.jp}</div>
      <div style="font-size:18px;color:#888;margin-bottom:6px">${p.hira}</div>
      <div class="phrase-pron">📣 ${p.pron}</div>
      <hr class="divider">
      <div style="font-size:22px;font-weight:700;color:#2d2d2d">${p.ko}</div>
  ` : `
      <div class="cat-tag">${cat.emoji} ${cat.name}</div>
      <div class="phrase-jp">${p.jp}</div>
      ${p.hira !== p.jp ? `<div class="phrase-hira">${p.hira}</div>` : ''}
      <div class="phrase-pron">📣 ${p.pron}</div>
      <hr class="divider">
      <div class="phrase-ko" style="font-size:${p.cat==='mama'?'15px':'20px'}">${p.ko}</div>
  `;
  document.getElementById('learn-cards').innerHTML = `
    <button class="back-btn" onclick="renderLearnCats()">← 목록</button>
    <div class="counter">${learnIdx+1} / ${ps.length}</div>
    <div class="phrase-card">
      ${cardBody}
      <div class="card-actions">
        <button class="tts-btn" onclick="speak('${esc(p.jp)}')">🔊 듣기</button>
        <button class="check-btn ${done?'done':''}" onclick="toggleLearned('${p.id}')">
          ${done ? '✓ 완료' : '✓ 체크'}
        </button>
      </div>
    </div>
    <div class="nav-arrows">
      <button class="arrow-btn" onclick="stepLearn(-1)" ${learnIdx===0?'disabled':''}>← 이전</button>
      <button class="arrow-btn" onclick="stepLearn(1)"  ${learnIdx===ps.length-1?'disabled':''}>다음 →</button>
    </div>`;
}

function stepLearn(d) {
  const ps = PHRASES.filter(p=>p.cat===learnCat);
  learnIdx = Math.max(0, Math.min(ps.length-1, learnIdx+d));
  renderLearnCard();
}

function toggleLearned(id) {
  learned[id] = !learned[id];
  save(); renderLearnCard();
}

// ── QUIZ ─────────────────────────────────────────────────────────
let qCat=null, qMode='normal', qList=[], qIdx=0, qScore=0;

function renderQuizSetup() {
  document.getElementById('quiz-setup').classList.remove('hidden');
  document.getElementById('quiz-active').classList.add('hidden');
  document.getElementById('quiz-result').classList.add('hidden');

  const convCats = CATS.filter(c=>!c.isWord && c.id!=='mama');
  const wordCats = CATS.filter(c=>c.isWord);
  const isMama = qMode==='mama';
  const best = isMama ? quizBestMama : quizBestNormal;

  document.getElementById('quiz-setup').innerHTML = `
    <div class="section-title">퀴즈</div>

    <!-- 모드 선택 -->
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <button onclick="setQMode('normal')" style="flex:1;padding:16px 8px;border-radius:14px;border:2px solid ${!isMama?'#c0392b':'#e0dbd5'};background:${!isMama?'#fff3f3':'white'};color:${!isMama?'#c0392b':'#888'};font-size:15px;font-weight:700">
        🎯 일반 퀴즈
      </button>
      <button onclick="setQMode('mama')" style="flex:1;padding:16px 8px;border-radius:14px;border:2px solid ${isMama?'#9b59b6':'#e0dbd5'};background:${isMama?'#f5eef8':'white'};color:${isMama?'#9b59b6':'#888'};font-size:15px;font-weight:700">
        👩 엄마용 고급
      </button>
    </div>

    ${isMama ? `
      <div style="background:#f5eef8;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#6c3483;line-height:1.7">
        🔥 실제 일본인이 쓰는 표현·관용구·유머까지!<br>난이도 최고 — 엄마만 도전 가능 😤
      </div>
      ${best ? `<div class="text-muted mt-12" style="margin-bottom:8px">최고 점수: ${best} / 10</div>` : ''}
      <button class="start-btn" style="background:#9b59b6" onclick="startQuiz()">고급 퀴즈 시작! 🔥</button>
    ` : `
      <p class="text-muted" style="margin-bottom:8px">카테고리 선택 (전체 or 하나)</p>
      <div class="filter-wrap">
        <button class="filter-btn ${!qCat?'on':''}" onclick="setQCat(null)">전체</button>
        ${convCats.map(c=>`<button class="filter-btn ${qCat===c.id?'on':''}" onclick="setQCat('${c.id}')">${c.emoji} ${c.name}</button>`).join('')}
      </div>
      <p class="text-muted" style="margin:10px 0 8px">단어</p>
      <div class="filter-wrap">
        ${wordCats.map(c=>`<button class="filter-btn ${qCat===c.id?'on':''}" style="${qCat===c.id?'border-color:#e67e22;background:#fff8f0;color:#e67e22':''}" onclick="setQCat('${c.id}')">${c.emoji} ${c.name}</button>`).join('')}
      </div>
      ${best ? `<div class="text-muted mt-12" style="margin-bottom:8px">최고 점수: ${best} / 10</div>` : ''}
      <button class="start-btn" onclick="startQuiz()">퀴즈 시작! 🎯</button>
    `}
    ${renderAISection()}`;
}

function setQMode(mode) { qMode=mode; qCat=null; renderQuizSetup(); }
function setQCat(c) { qCat = c; renderQuizSetup(); }

function renderAISection() {
  const hasKey = !!getApiKey();
  const sitBtns = AI_SITUATIONS.map((s,i)=>
    `<button class="sit-btn ${aiSitIdx===i?'on':''}" onclick="selectAISit(${i})">${s.label}</button>`
  ).join('');
  return `
    <div class="ai-section">
      <div class="ai-section-title">🤖 AI 무한 문제</div>
      <div class="ai-info">상황을 선택하면 AI가 그 상황에 맞는 새 표현 10개를 생성해 퀴즈를 만들어요!</div>
      ${IS_SERVER_MODE
        ? `<div style="background:#e8f5e9;border-radius:10px;padding:8px 14px;font-size:13px;color:#2e7d32;margin-bottom:14px">✅ 서버에서 자동 처리 — 키 입력 불필요!</div>`
        : (!hasKey ? `<div style="background:#fff3f3;border-radius:10px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:14px">⚙️ 상단 설정(⚙️)에서 API 키를 입력해주세요 — Gemini는 무료!</div>` : '')
      }
      <div class="sit-grid">${sitBtns}</div>
      <input id="custom-sit-input" class="modal-input" placeholder="직접 입력 (예: 게임센터에서)" style="margin-bottom:12px" value="${aiCustom}"/>
      ${aiGenerating ? `<div class="ai-generating"><span class="spin">⚙️</span><div style="margin-top:12px;font-size:14px;color:#3498db;font-weight:700">AI가 문제를 만들고 있어요...</div></div>` :
        `<button class="start-btn" style="background:#3498db;margin-top:0" onclick="runAIQuiz()">✨ AI로 새 문제 만들기</button>`}
      ${aiPhrases.length ? `<button class="outline-btn" style="color:#3498db;border-color:#3498db;margin-top:8px" onclick="startAIQuizNow()">▶ 마지막 생성 문제로 퀴즈 (${aiLastSit})</button>` : ''}
    </div>`;
}

function selectAISit(i) {
  aiSitIdx = i; aiCustom = '';
  const inp = document.getElementById('custom-sit-input');
  if (inp) inp.value = '';
  document.querySelectorAll('.sit-btn').forEach((b,idx)=>b.classList.toggle('on', idx===i));
}

async function runAIQuiz() {
  if (aiGenerating) return;
  const customInp = document.getElementById('custom-sit-input');
  if (customInp) aiCustom = customInp.value.trim();
  const sit = aiSitIdx !== null ? AI_SITUATIONS[aiSitIdx].text : aiCustom;
  const sitLabel = aiSitIdx !== null ? AI_SITUATIONS[aiSitIdx].label : aiCustom;
  if (!sit) { alert('상황을 선택하거나 직접 입력해주세요'); return; }
  aiGenerating = true; renderQuizSetup();
  try {
    const phrases = await generateAIPhrases(sit);
    if (!phrases || phrases.length < 4) throw new Error('표현 생성 실패');
    aiPhrases = phrases;
    aiLastSit = sitLabel;
    startAIQuizNow();
  } catch(e) {
    aiGenerating = false; renderQuizSetup();
    alert(`오류가 발생했어요:\n${e.message}\nAPI 키를 확인해주세요.`);
  }
  aiGenerating = false;
}

function startAIQuizNow() {
  if (!aiPhrases.length) return;
  qList = shuffle(aiPhrases).map((p,i)=>({p, type:i%2})); // mc + listening only (no blanks)
  qIdx=0; qScore=0; qMode='ai';
  document.getElementById('quiz-setup').classList.add('hidden');
  document.getElementById('quiz-result').classList.add('hidden');
  document.getElementById('quiz-active').classList.remove('hidden');
  renderQ();
}

function startQuiz() {
  const pool = qMode==='mama'
    ? PHRASES.filter(p=>p.cat==='mama')
    : (qCat ? PHRASES.filter(p=>p.cat===qCat) : PHRASES.filter(p=>p.cat!=='mama'));
  if (pool.length < 4) { alert('문장이 너무 적어요!'); return; }
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  qList = shuffled.slice(0, Math.min(10, shuffled.length)).map((p, i) => {
    // cycle through types: 0=객관식, 1=듣기, 2=빈칸
    let type = i % 3;
    if (type === 2 && !p.blank) type = 0;
    return { p, type };
  });
  qIdx = 0; qScore = 0;
  document.getElementById('quiz-setup').classList.add('hidden');
  document.getElementById('quiz-result').classList.add('hidden');
  document.getElementById('quiz-active').classList.remove('hidden');
  renderQ();
}

function renderQ() {
  if (qIdx >= qList.length) { showResult(); return; }
  const { p, type } = qList[qIdx];
  // AI 모드: aiPhrases에서 오답 선택 / 일반 모드: 같은 카테고리 우선
  let others;
  if (qMode === 'ai') {
    others = aiPhrases.filter(x=>x.id!==p.id).sort(()=>Math.random()-0.5).slice(0,3);
    if (others.length < 3) {
      const extra = PHRASES.sort(()=>Math.random()-0.5).slice(0, 3-others.length);
      others = [...others, ...extra];
    }
  } else {
    let sameCat = PHRASES.filter(x=>x.id!==p.id && x.cat===p.cat).sort(()=>Math.random()-0.5);
    others = sameCat.slice(0,3);
    if (others.length < 3) {
      const extra = PHRASES.filter(x=>x.id!==p.id && x.cat!==p.cat).sort(()=>Math.random()-0.5).slice(0, 3-others.length);
      others = [...others, ...extra];
    }
  }
  let html = '';

  if (type === 0) {
    // 객관식: 한국어 → 일본어 고르기
    const opts = shuffle([p,...others]).map(o=>
      `<div class="opt-row">
        <button class="opt" data-id="${o.id}" onclick="answerMC(this.closest('.opt-row'),'${p.id}')">${o.jp}</button>
        <button class="spk-btn" onclick="event.stopPropagation();speak('${esc(o.jp)}')">🔊</button>
      </div>`).join('');
    html = `
      <div class="quiz-card">
        <div class="quiz-tag">📝 맞는 일본어를 고르세요</div>
        <div class="quiz-q">${p.ko}</div>
      </div>
      <div class="options">${opts}</div>`;

  } else if (type === 1) {
    // 듣기: TTS → 한국어 뜻 고르기
    const opts = shuffle([p,...others]).map(o=>
      `<div class="opt-row">
        <button class="opt" data-id="${o.id}" onclick="answerMC(this.closest('.opt-row'),'${p.id}')">${o.ko}</button>
        <button class="spk-btn" onclick="event.stopPropagation();speak('${esc(o.jp)}')">🔊</button>
      </div>`).join('');
    html = `
      <div class="quiz-card">
        <div class="quiz-tag">🔊 듣고 뜻을 고르세요</div>
        <div class="quiz-q" style="color:#aaa;font-size:15px">아래 버튼으로 들어보세요!</div>
        <button class="audio-btn" onclick="speak('${esc(p.jp)}')">🔊 듣기</button>
      </div>
      <div class="options">${opts}</div>`;
    setTimeout(()=>speak(p.jp), 500);

  } else {
    // 빈칸: 일본어 빈칸 → 단어 고르기
    const b = p.blank;
    const display = p.jp.replace(b.w, '＿＿＿');
    const opts = shuffle(b.opts).map(o=>
      `<div class="opt-row">
        <button class="opt" onclick="answerBlank(this.closest('.opt-row'),'${esc(o)}','${esc(b.w)}')">${o}</button>
        <button class="spk-btn" onclick="event.stopPropagation();speak('${esc(o)}')">🔊</button>
      </div>`).join('');
    html = `
      <div class="quiz-card">
        <div class="quiz-tag">✏️ 빈칸을 채우세요</div>
        <div class="quiz-q">${display}</div>
        <div class="quiz-sub">${p.ko}</div>
      </div>
      <div class="options">${opts}</div>`;
  }

  document.getElementById('quiz-active').innerHTML = `
    <div class="q-progress">
      <div class="q-progress-row">
        <span>문제 ${qIdx+1} / ${qList.length}</span>
        <span>⭐ ${qScore}점</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${qIdx/qList.length*100}%"></div></div>
    </div>
    ${html}
    <div id="qfb" class="hidden"></div>`;
}

function answerMC(row, correctId) {
  const rows = document.querySelectorAll('.opt-row');
  rows.forEach(r => r.querySelector('.opt').disabled = true);
  const isOK = row.querySelector('.opt').dataset.id === correctId;
  row.classList.add(isOK ? 'correct' : 'wrong');
  row.querySelector('.opt').classList.add(isOK ? 'correct' : 'wrong');
  if (!isOK) rows.forEach(r => {
    if (r.querySelector('.opt').dataset.id === correctId) {
      r.classList.add('correct'); r.querySelector('.opt').classList.add('correct');
    }
  });
  if (isOK) { qScore++; learned[correctId] = true; save(); }
  showFB(isOK, correctId);
}

function answerBlank(row, selected, correct) {
  document.querySelectorAll('.opt-row').forEach(r => {
    const b = r.querySelector('.opt');
    b.disabled = true;
    if (b.textContent.trim() === correct) { r.classList.add('correct'); b.classList.add('correct'); }
  });
  const isOK = selected === correct;
  if (!isOK) { row.classList.add('wrong'); row.querySelector('.opt').classList.add('wrong'); }
  if (isOK) { qScore++; learned[qList[qIdx].p.id] = true; save(); }
  showFB(isOK, qList[qIdx].p.id);
}

function showFB(ok, correctId) {
  const allPool = qMode==='ai' ? aiPhrases : PHRASES;
  const cp = allPool.find(p=>p.id===correctId) || PHRASES.find(p=>p.id===correctId);
  const isLast = qIdx === qList.length - 1;
  document.getElementById('qfb').classList.remove('hidden');
  document.getElementById('qfb').innerHTML = `
    <div class="feedback-box">
      <span class="fb-emoji">${ok ? '🎉' : '😅'}</span>
      <div class="fb-text">${ok ? '정답이에요!' : '아쉬워요!'}</div>
      ${!ok && cp ? `<div class="fb-ans">정답: ${cp.jp}　(${cp.ko})</div>` : ''}
    </div>
    <button class="next-btn" onclick="nextQ()">${isLast ? '결과 보기 🎉' : '다음 문제 →'}</button>`;
}

function nextQ() { qIdx++; renderQ(); }

function showResult() {
  document.getElementById('quiz-active').classList.add('hidden');
  const res = document.getElementById('quiz-result');
  res.classList.remove('hidden');
  if (qMode==='mama') { if (qScore>quizBestMama) { quizBestMama=qScore; save(); } }
  else if (qMode!=='ai') { if (qScore>quizBestNormal) { quizBestNormal=qScore; save(); } }
  const pct = Math.round(qScore/qList.length*100);
  const [emoji, msg] =
    pct===100 ? ['🏆','완벽해요! 천재!'] :
    pct>=80   ? ['🌟','아주 잘했어요!'] :
    pct>=60   ? ['👍','잘했어요! 더 해봐요!'] :
                ['💪','다시 도전해봐요!'];
  const isAI = qMode==='ai';
  const isMama = qMode==='mama';
  const btnColor = isAI?'#3498db':isMama?'#9b59b6':'#c0392b';
  res.innerHTML = `
    <div class="result-card">
      <span class="result-emoji">${emoji}</span>
      ${isAI?`<div style="font-size:13px;color:#3498db;font-weight:700;margin-bottom:8px">🤖 AI 문제 — ${aiLastSit}</div>`:''}
      <div class="result-score">${qScore} / ${qList.length}</div>
      <div class="result-label">맞힌 문제</div>
      <div class="result-msg">${msg}</div>
    </div>
    ${isAI ? `
      <button class="start-btn" style="background:#3498db" onclick="startAIQuizNow()">▶ 같은 표현 다시 도전! 🤖</button>
      <button class="start-btn" style="background:#27ae60;margin-top:8px" onclick="runAIQuizFromResult()">✨ 새 AI 문제 생성</button>
    ` : `
      <button class="start-btn" style="background:${btnColor}" onclick="startQuiz()">다시 도전! ${isMama?'🔥':'🎯'}</button>
    `}
    <button class="outline-btn" style="color:${btnColor};border-color:${btnColor}" onclick="renderQuizSetup()">모드 변경</button>`;
}

const shuffle = arr => [...arr].sort(()=>Math.random()-0.5);

async function runAIQuizFromResult() {
  document.getElementById('quiz-result').classList.add('hidden');
  document.getElementById('quiz-setup').classList.remove('hidden');
  renderQuizSetup();
  // 스크롤 맨 아래 (AI 섹션으로)
  setTimeout(()=>{ const el=document.querySelector('.ai-section'); if(el) el.scrollIntoView({behavior:'smooth'}); }, 100);
}

// ── LISTEN & REPEAT ───────────────────────────────────────────────
let repCat=null, repIdx=0, repMode='normal', recog=null, isRecording=false;

function renderRepeatSetup() {
  repCat = null;
  if (isRecording) stopMic();
  document.getElementById('repeat-active').classList.add('hidden');
  const isMama = repMode === 'mama';
  const repConvCats = CATS.filter(c=>!c.isWord && c.id!=='mama');
  const repWordCats = CATS.filter(c=>c.isWord);
  const repCatCard = (cat, full) => {
    const cnt = PHRASES.filter(p=>p.cat===cat.id).length;
    const color = cat.isWord ? '#e67e22' : '#c0392b';
    return `<div class="cat-card" onclick="startRepeat('${cat.id}')" style="${full?'grid-column:1/-1;':''}">
      <span class="cat-emoji">${cat.emoji}</span>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-prog">${cnt}개</div>
    </div>`;
  };

  let repBody = '';
  if (isMama) {
    repBody = `
      <div style="background:#f5eef8;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#6c3483;line-height:1.7">🔥 고급 표현을 듣고 따라해보세요!</div>
      <div class="section-title">카테고리 선택</div>
      <div class="cat-grid">${repCatCard(CATS.find(c=>c.id==='mama'), true)}</div>`;
  } else {
    repBody = `
      <div class="section-title">💬 회화</div>
      <div class="cat-grid">${repConvCats.map(c=>repCatCard(c,false)).join('')}</div>
      <div class="section-title" style="margin-top:20px">📝 단어</div>
      <div class="cat-grid">${repWordCats.map(c=>repCatCard(c,false)).join('')}</div>`;
  }

  const aiRepSection = `
    <div class="ai-section">
      <div class="ai-section-title">🤖 AI 상황 연습</div>
      <div class="ai-info">상황을 선택하면 AI가 그 상황에 맞는 표현을 생성해 따라하기 연습을 시작해요!</div>
      ${IS_SERVER_MODE
        ? `<div style="background:#e8f5e9;border-radius:10px;padding:8px 14px;font-size:13px;color:#2e7d32;margin-bottom:14px">✅ 서버에서 자동 처리 — 키 입력 불필요!</div>`
        : (!getApiKey() ? `<div style="background:#fff3f3;border-radius:10px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:14px">⚙️ 상단 설정(⚙️)에서 API 키를 입력해주세요 — Gemini는 무료!</div>` : '')
      }
      <div class="sit-grid">${AI_SITUATIONS.map((s,i)=>`<button class="sit-btn" onclick="runAIRepeat(${i})">${s.label}</button>`).join('')}</div>
      ${aiPhrases.length && aiLastSit ? `<button class="outline-btn" style="color:#3498db;border-color:#3498db;margin-top:0" onclick="startAIRepeatNow()">▶ 마지막 AI 표현 연습 (${aiLastSit})</button>` : ''}
    </div>`;

  document.getElementById('repeat-setup').innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <button onclick="setRepMode('normal')" style="${modeBtnStyle(!isMama,'#c0392b')}">🎤 일반</button>
      <button onclick="setRepMode('mama')"  style="${modeBtnStyle(isMama,'#9b59b6')}">👩 엄마용 고급</button>
    </div>
    ${repBody}
    ${aiRepSection}`;
}

function setRepMode(mode) { repMode = mode; renderRepeatSetup(); }

function startRepeat(catId) {
  repCat = catId; repIdx = 0; repIsAI = false;
  document.getElementById('repeat-setup').innerHTML = '';
  renderRepeatCard();
}

let repIsAI = false;

async function runAIRepeat(sitIdx) {
  if (!getApiKey()) { showSettingsModal(); return; }
  const sit = AI_SITUATIONS[sitIdx];
  const btn = document.querySelectorAll('.ai-section .sit-btn')[sitIdx];
  if (btn) { btn.textContent = '⏳ 생성 중...'; btn.disabled = true; }
  try {
    const phrases = await generateAIPhrases(sit.text);
    if (!phrases || phrases.length < 2) throw new Error('생성 실패');
    aiPhrases = phrases; aiLastSit = sit.label;
    startAIRepeatNow();
  } catch(e) {
    alert(`오류: ${e.message}`);
    renderRepeatSetup();
  }
}

function startAIRepeatNow() {
  if (!aiPhrases.length) return;
  repIsAI = true; repIdx = 0;
  document.getElementById('repeat-setup').innerHTML = '';
  renderRepeatCard();
}

function renderRepeatCard() {
  if (isRecording) stopMic();
  const ps = repIsAI ? aiPhrases : PHRASES.filter(p=>p.cat===repCat);
  const p  = ps[repIdx];
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasMic = !!SpeechRec;
  const act = document.getElementById('repeat-active');
  act.classList.remove('hidden');
  act.innerHTML = `
    <button class="back-btn" onclick="renderRepeatSetup()">← 목록</button>
    ${repIsAI ? `<div style="display:inline-block;background:#eaf4fd;color:#2980b9;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:8px">🤖 AI — ${aiLastSit}</div>` : ''}
    <div class="counter">${repIdx+1} / ${ps.length}</div>

    <div class="repeat-card">
      <div class="step-tag">STEP 1 — 듣고 읽기</div>
      <div class="phrase-jp">${p.jp}</div>
      ${p.hira!==p.jp?`<div style="font-size:15px;color:#aaa;margin-top:6px">${p.hira}</div>`:''}
      <div style="display:inline-block;background:#fff3f3;color:#c0392b;font-size:15px;font-weight:700;padding:6px 18px;border-radius:20px;margin:10px 0 6px">📣 ${p.pron}</div>
      <div style="font-size:20px;font-weight:700;color:#2d2d2d;margin-top:4px">${p.ko}</div>
      <div style="display:flex;gap:8px;margin:18px auto 0;justify-content:center">
        <button class="tts-btn" onclick="speak('${esc(p.jp)}')">🔊 듣기</button>
        <button class="tts-btn" style="background:#e67e22" onclick="speakSlow('${esc(p.jp)}')">🐢 천천히</button>
      </div>
    </div>

    <div class="repeat-card">
      <div class="step-tag">STEP 2 — 따라하기</div>
      ${hasMic ? `
        <div class="mic-wrap">
          <button class="mic-btn" id="mic-btn" onclick="toggleMic('${esc(p.jp)}')">🎤</button>
        </div>
        <div class="mic-label" id="mic-label">버튼을 누르고 말해보세요</div>
        <div class="recog-box" id="recog-box">인식된 내용이 여기 표시돼요</div>
        <div id="mic-result"></div>
      ` : `
        <div style="padding:24px;text-align:center;color:#aaa;font-size:13px;line-height:1.8">
          ⚠️ 이 브라우저에서는 음성 인식이 지원되지 않아요.<br>
          Chrome 브라우저를 사용해주세요.
        </div>
      `}
    </div>

    <div class="nav-arrows">
      <button class="arrow-btn" onclick="stepRepeat(-1)" ${repIdx===0?'disabled':''}>← 이전</button>
      <button class="arrow-btn" onclick="stepRepeat(1)"  ${repIdx===ps.length-1?'disabled':''}>다음 →</button>
    </div>`;
  setTimeout(()=>speak(p.jp), 400);
}

function stepRepeat(d) {
  const ps = repIsAI ? aiPhrases : PHRASES.filter(p=>p.cat===repCat);
  repIdx = Math.max(0, Math.min(ps.length-1, repIdx+d));
  renderRepeatCard();
}

function speakSlow(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.55;
  speechSynthesis.speak(u);
}
function toggleMic(target) { isRecording ? stopMic() : startMic(target); }

function startMic(target) {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) return;
  recog = new SpeechRec();
  recog.lang = 'ja-JP';
  recog.continuous = false;
  recog.interimResults = true;
  isRecording = true;
  const btn = document.getElementById('mic-btn');
  const lbl = document.getElementById('mic-label');
  const box = document.getElementById('recog-box');
  const res = document.getElementById('mic-result');
  btn.classList.add('recording'); btn.textContent = '⏹';
  lbl.textContent = '듣고 있어요... 말해보세요!';
  box.style.color = '#2d2d2d';
  recog.onresult = e => {
    let interim='', final='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    box.textContent = final || interim || '...';
    if (final) {
      const sim = similarity(final.replace(/\s/g,''), target.replace(/\s/g,'').replace(/〜/g,''));
      const score = Math.round(sim * 100);
      let cls, msg, barColor;
      if      (score>=90) { cls='good';  msg='🏆 완벽해요!';              barColor='#27ae60'; }
      else if (score>=75) { cls='good';  msg='🎉 아주 잘했어요!';          barColor='#2ecc71'; }
      else if (score>=60) { cls='good';  msg='👍 잘했어요!';               barColor='#f39c12'; }
      else if (score>=45) { cls='retry'; msg='😊 거의 맞아요, 한 번 더!';  barColor='#e67e22'; }
      else if (score>=25) { cls='retry'; msg='💪 더 연습해봐요!';           barColor='#e74c3c'; }
      else                { cls='retry'; msg='🎤 다시 듣고 따라해봐요!';   barColor='#c0392b'; }
      res.innerHTML = `<div class="recog-result ${cls}" style="padding:14px 16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:15px;font-weight:700">${msg}</span>
          <span style="font-size:28px;font-weight:800;color:${barColor};line-height:1">${score}<span style="font-size:13px;font-weight:600">점</span></span>
        </div>
        <div style="background:#e0e0e0;border-radius:8px;height:12px;overflow:hidden;margin-bottom:${score<60?'10px':'0'}">
          <div style="width:${score}%;height:100%;background:${barColor};border-radius:8px;transition:width 0.6s ease"></div>
        </div>
        ${score<60?`<div style="font-size:12px;color:#888;margin-top:2px">정답: ${target}</div>`:''}
      </div>`;
    }
  };
  recog.onerror = e => {
    stopMic();
    if (e.error !== 'no-speech') res.innerHTML = `<div class="recog-result err">오류: ${e.error}. 마이크 권한을 확인해주세요.</div>`;
  };
  recog.onend = () => stopMic();
  recog.start();
}

function stopMic() {
  isRecording = false;
  try { recog && recog.stop(); } catch(e){}
  const btn = document.getElementById('mic-btn');
  const lbl = document.getElementById('mic-label');
  if (btn) { btn.classList.remove('recording'); btn.textContent = '🎤'; }
  if (lbl) lbl.textContent = '버튼을 누르고 말해보세요';
}

function levenshtein(a, b) {
  const m=a.length, n=b.length;
  const dp=[];
  for (let i=0;i<=m;i++) { dp[i]=[]; for(let j=0;j<=n;j++) dp[i][j]=i===0?j:j===0?i:0; }
  for (let i=1;i<=m;i++)
    for (let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function similarity(a, b) {
  if (!a||!b) return 0;
  a=a.replace(/\s/g,''); b=b.replace(/\s/g,'');
  if (a===b) return 1;
  const dist=levenshtein(a,b);
  return Math.max(0, 1-dist/Math.max(a.length,b.length));
}

// ── PROGRESS ─────────────────────────────────────────────────────
function renderProgress() {
  const total = PHRASES.length;
  const done  = PHRASES.filter(p=>learned[p.id]).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-content').innerHTML = `
    <div class="total-card">
      <div class="total-pct">${pct}%</div>
      <div class="total-label">전체 학습 완료</div>
      <div class="total-sub">${done} / ${total}문장 · 퀴즈 최고: 일반 ${quizBestNormal}/10 · 고급 ${quizBestMama}/10</div>
    </div>
    <div class="section-title" style="margin-top:4px">카테고리별 진도</div>
    ${CATS.map(cat=>{
      const ps = PHRASES.filter(p=>p.cat===cat.id);
      const cd = ps.filter(p=>learned[p.id]).length;
      const cp = ps.length ? Math.round(cd/ps.length*100) : 0;
      return `<div class="prog-item">
        <div class="prog-row">
          <div class="prog-name">${cat.emoji} ${cat.name}</div>
          <div class="prog-cnt">${cd} / ${ps.length}</div>
        </div>
        <div class="prog-bar2"><div class="prog-fill2" style="width:${cp}%"></div></div>
      </div>`;
    }).join('')}
    <button class="reset-btn" onclick="resetAll()">진도 초기화</button>`;
}

function resetAll() {
  if (!confirm('모든 학습 진도를 초기화할까요?')) return;
  learned = {}; quizBestNormal = 0; quizBestMama = 0; save(); renderProgress();
}

// ── INIT ─────────────────────────────────────────────────────────
initLearn();
</script>
